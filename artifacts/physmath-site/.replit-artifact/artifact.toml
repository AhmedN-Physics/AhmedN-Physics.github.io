kind = "web"
previewPath = "/"
title = "physmath done right"
version = "1.0.0"
id = "artifacts/physmath-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25338

[services.development]
run = "pnpm --filter @workspace/physmath-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/physmath-site", "run", "build" ]
publicDir = "artifacts/physmath-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25338"
BASE_PATH = "/"

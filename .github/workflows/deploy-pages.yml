name: Deploy physmath-site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm --filter @workspace/physmath-site run build:gh-pages
        env:
          # This repo deploys as a user/org GitHub Pages site
          # (https://AhmedN-Physics.github.io/), which is served from the
          # domain root, so the base path must be "/". Only use a
          # "/<repo-name>/" base path for project pages served under a
          # subpath.
          GH_PAGES_BASE: /

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/physmath-site/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
